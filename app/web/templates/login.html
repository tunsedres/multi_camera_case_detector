<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş · Packing Detector</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="login-wrap">
    <div class="login-card panel">
      <div class="brand" style="justify-content:center; margin-bottom:18px;">
        <span class="logo">📦</span>
        <span>Packing Detector</span>
      </div>

      {% if error %}
      <p class="card-value warn" style="font-size:14px;">{{ error }}</p>
      {% endif %}

      <form method="post" action="/login" class="login-form">
        <label>Kullanıcı adı
          <input type="text" name="username" autocomplete="username" autofocus required>
        </label>
        <label>Şifre
          <input type="password" name="password" autocomplete="current-password" required>
        </label>
        <button type="submit">Giriş Yap</button>
      </form>

      <p class="muted" style="text-align:center; margin-top:16px;">v{{ version }}</p>
    </div>
  </main>
</body>
</html>
