services:
  packing-detector:
    build: .
    container_name: packing-detector
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Admin Web Panel (WEB_PORT ile değiştirilebilir)
      - "8080:8080"
    volumes:
      # Config + lisans dosyası (read-only)
      - ./config:/app/config:ro
      # Veritabanı + snapshot'lar (kalıcı)
      - ./data:/app/data
      # Loglar
      - ./logs:/app/logs
    environment:
      - TZ=Europe/Istanbul
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    # Windows Docker Desktop: bridge (varsayılan) çalışır, RTSP outbound sorunsuz.
    # Linux'ta ağ performansı için host network kullanılabilir (o durumda 'ports'
    # satırını kaldır, çünkü host network'te port mapping yoktur):
    #   network_mode: host
