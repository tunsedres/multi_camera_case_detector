# ============================================================
#  Packing Detector — Ana Konfigürasyon
#  Sırlar (token, şifre) burada DEĞİL .env içinde tutulur.
#  RTSP URL'lerindeki {user}/{pass} .env'deki CAMERA_* ile doldurulur.
# ============================================================

# ---- Kameralar ----
# Kameralar artık SQLite'ta (events.db) tutulur ve Admin Panel'den yönetilir:
#   Panel → Kameralar (/settings/cameras) → ekle / düzenle / sil / aç-kapat.
# RTSP'de kullanıcı/şifre {user}/{pass} olarak girilir; bunlar .env'deki CAMERA_*
# ile doldurulur (sır DB'ye yazılmaz). Bu dosyadaki 'cameras' bölümü yoksayılır.
# Hikvision substream: "/Streaming/Channels/<kanal>2" (düşük çözünürlük, barkod için yeterli)

# ---- Tespit ----
detection:
  # Yöntem: 'paddle' (PaddleOCR — order-name'i okur, en doğru; bu kurulumda kullanılan),
  # 'ocr' (Tesseract — daha hızlı ama rakam karıştırabilir), 'barcode'/'yolo' (pyzbar).
  # NOT: Barkod bu kamera açısında çok küçük; pyzbar/YOLO okuyamadı (test edildi).
  # Tesseract rakam karıştırıyordu (#939146→#839146, yanlış siparişe yazma riski).
  # PaddleOCR aynı videoda 3 etiketi de sıfır yanlış-hane ile okudu.
  mode: paddle
  paddle_model_root: models/paddleocr/whl
  paddle_min_confidence: 0.80      # PaddleOCR güven eşiği (0-1)
  yolo_model_path: models/barcode_yolov8s.pt
  yolo_conf: 0.35
  target_fps: 1                    # PaddleOCR CPU'da ~1 kare/sn; etiket saniyeler kalıyor, yeterli
  # Tekrar engelleme: 'daily' = aynı sipariş günde 1 kez (kameradan bağımsız),
  # 'window' = aynı sipariş+kamera dedup_window_seconds içinde 1 kez.
  dedup_mode: daily
  dedup_window_seconds: 30         # ('window' modunda) aynı sipariş+kamera tekrar yoksayma
  # Order name formatı: '#' + 6-10 hane. Yarım/yanlış OCR okumalarını eler.
  order_no_regex: '^#?\d{6,10}$'
  add_hash_prefix: true            # '939146' -> '#939146' (Shopify order name araması)
  ocr_min_confidence: 60           # OCR güven eşiği (0-100); düşük=çok okuma+çok yanlış
  # Çoklu-kare oylama: değer vote_window_seconds içinde min_votes kez okununca onaylanır.
  min_votes: 3                     # 1 = oylama kapalı (her okuma anında tetikler)
  vote_window_seconds: 4
  # 'barcode'/'yolo'/'both' modunda hangi barkod tipleri taransın
  symbols: ["EAN13", "CODE128", "QRCODE"]

# ---- Shopify ----
shopify:
  write_to_order_note: true        # order.note alanına append
  write_to_metafield: true         # Yapısal kayıt için metafield
  metafield_namespace: "packing"
  note_template: "📦 [{timestamp}] Paketleme: {camera_name} (Kamera #{camera_id})"
  poll_interval_seconds: 2.0       # ShopifyWorker pending tarama aralığı
  max_retries: 5                   # Başarısız event kaç kez tekrar denensin

# ---- Depolama ----
storage:
  db_path: "data/events.db"
  snapshots_enabled: true
  snapshots_dir: "data/snapshots"
  snapshot_retention_days: 90      # 0 = silme
  jpeg_quality: 85

# ---- Bakım (scheduler) ----
maintenance:
  cleanup_interval_hours: 6        # Retention temizliği kaç saatte bir çalışsın
  license_recheck_hours: 12        # Lisans süre/geçerlilik yeniden kontrol aralığı

# ---- İzleme / sağlık ----
monitoring:
  # Bir kamera bu kadar saniye frame üretmezse "stale/down" sayılır
  camera_stale_seconds: 60
