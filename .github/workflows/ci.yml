name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # opencv-python-headless + pyzbar için sistem kütüphaneleri
      - name: Sistem bağımlılıkları
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libzbar0 libgl1 libglib2.0-0 ffmpeg

      - name: Python bağımlılıkları
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format kontrol (ruff)
        run: ruff format --check .

      - name: Testler (pytest + coverage)
        run: pytest --cov=app --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - name: Docker image build (smoke)
        run: docker build -t packing-detector:ci .
